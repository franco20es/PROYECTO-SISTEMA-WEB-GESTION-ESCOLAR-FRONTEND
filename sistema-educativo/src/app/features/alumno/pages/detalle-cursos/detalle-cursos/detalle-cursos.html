<div class="dc2-loading" *ngIf="cargando">
  <div class="dc2-spinner"></div>
  <p>Cargando información académica...</p>
</div>

<div class="dc2" *ngIf="!cargando && curso">

  <div class="dc2-hero">
    <button class="dc2-back" (click)="volverACursos()">
      <i class="bi bi-arrow-left"></i> Volver a mis asignaturas
    </button>
    
    <div class="dc2-hero-row">
      <div class="dc2-hero-left">
        <div class="dc2-htag">Periodo Vigente · 2° Bimestre</div>
        <h1 class="dc2-htitle">{{ curso.nombre }}</h1>
        <div class="dc2-hmeta">
          <span class="dc2-hm"><i class="bi bi-person-badge-fill"></i> {{ curso.profesor }}</span>
          <span class="dc2-hm"><i class="bi bi-calendar-week-fill"></i> {{ curso.horario }}</span>
          <span class="dc2-hm"><i class="bi bi-geo-alt-fill"></i> {{ curso.seccion }}</span>
        </div>
      </div>
      
      <div class="dc2-hstats">
        <div class="dc2-hstat">
          <div class="dc2-hstat-val ok">{{ curso.promedio > 0 ? curso.promedio : '—' }}</div>
          <div class="dc2-hstat-lbl">Promedio</div>
        </div>
        <div class="dc2-hstat">
          <div class="dc2-hstat-val bl">{{ curso.asistencia }}%</div>
          <div class="dc2-hstat-lbl">Asistencia</div>
        </div>
      </div>
    </div>
  </div>

  <div class="dc2-tabs-container">
    <div class="dc2-tabs">
      <div class="dc2-tab" *ngFor="let t of tabs"
           [class.active]="tabActiva === t.key"
           (click)="setTab(t.key)">
        <i [class]="t.icon"></i> {{ t.label }}
      </div>
    </div>
  </div>

  <div class="dc2-content">
    <app-silabo-tab       *ngIf="tabActiva === 'silabo'"       [cursoId]="cursoId"></app-silabo-tab>
    <app-contenido-tab    *ngIf="tabActiva === 'contenido'"    [cursoId]="cursoId"></app-contenido-tab>
    <app-tareas-tab       *ngIf="tabActiva === 'tareas'"       [cursoId]="cursoId"></app-tareas-tab>
    <app-evaluaciones-tab *ngIf="tabActiva === 'evaluaciones'" [cursoId]="cursoId"></app-evaluaciones-tab>
    <app-anuncios-tab     *ngIf="tabActiva === 'anuncios'"     [cursoId]="cursoId"></app-anuncios-tab>
    <app-foro-tab         *ngIf="tabActiva === 'foro'"         [cursoId]="cursoId"></app-foro-tab>
  </div>

</div>
