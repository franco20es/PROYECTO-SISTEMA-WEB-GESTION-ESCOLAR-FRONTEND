<div class="container">
  <!-- Progress Bar Superior -->
  <div style="margin-bottom: 20px;">
    <div style="display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 700; color: var(--primary); margin-bottom: 8px;">
      <span>PROGRESO DE MATRÍCULA</span>
      <span>{{progress}}</span>
    </div>
    <div style="height: 6px; background: var(--border); border-radius: 10px; overflow: hidden;">
      <div [style.width]="progress" style="height: 100%; background: var(--primary); transition: 0.5s ease;"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-hdr">
      <h2 class="card-title">Ficha de Inscripción 2026</h2>
    </div>

    <div class="card-body">
      <!-- Sección 1: Datos del Estudiante -->
      <div style="margin-bottom: 30px;">
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
          <span style="background: var(--primary); color: white; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 800;">1</span>
          <h3 style="font-size: 0.9rem; margin: 0; color: var(--txt-primary);">Información del Estudiante</h3>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Apellido Paterno</label>
            <input type="text" class="form-input" placeholder="Ej. Roca">
          </div>
          <div class="form-group">
            <label class="form-label">Apellido Materno</label>
            <input type="text" class="form-input" placeholder="Ej. Calderón">
          </div>
          <div class="form-group" style="grid-column: span 2;">
            <label class="form-label">Nombres Completos</label>
            <input type="text" class="form-input" placeholder="Jan Franco">
          </div>
        </div>
      </div>

      <!-- Sección 2: Nivel Académico -->
      <div style="margin-bottom: 30px;">
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
          <span style="background: var(--primary); color: white; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 800;">2</span>
          <h3 style="font-size: 0.9rem; margin: 0; color: var(--txt-primary);">Nivel y Grado</h3>
        </div>

        <div class="form-group">
          <label class="form-label">Seleccione Nivel</label>
          <div class="radio-group">
            
            <div class="radio-card" (click)="seleccionarNivel('primaria')" [class.selected]="grados === niveles.primaria">
              <div class="radio-dot"></div>
              <span class="radio-text">Primaria</span>
            </div>
            <div class="radio-card" (click)="seleccionarNivel('secundaria')" [class.selected]="grados === niveles.secundaria">
              <div class="radio-dot"></div>
              <span class="radio-text">Secundaria</span>
            </div>
          </div>
        </div>

        <div class="form-group" style="margin-top: 20px;" *ngIf="mostrarGrados">
          <label class="form-label">Grado / Año</label>
          <select class="form-select">
            <option value="">Seleccione...</option>
            <option *ngFor="let g of grados" [value]="g">{{g}}</option>
          </select>
        </div>
      </div>

      <!-- Footer con botón -->
      <div style="display: flex; justify-content: flex-end; padding-top: 20px; border-top: 1px solid var(--border);">
        <button class="btn-primary" (click)="enviar()">
          Finalizar Registro
        </button>
      </div>
    </div>
  </div>
</div>
