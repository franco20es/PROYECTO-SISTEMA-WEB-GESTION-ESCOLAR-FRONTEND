<div class="master-container">

    <div class="brand-side">
        <img src="https://res.cloudinary.com/dgrdonnsk/image/upload/v1778548033/Gemini_Generated_Image_474wb3474wb3474w_tk0x0d.png" 
             alt="Ilustración Recuperación" class="brand-illustration">
    </div>

    <div class="form-side">
        <div class="form-box">
            
            <div class="form-logo-container">
                <img src="https://res.cloudinary.com/dgrdonnsk/image/upload/v1778545840/ChatGPT_Image_11_may_2026_19_30_36_rqnapm.png" 
                     alt="Logo AdminRC" class="form-logo">
            </div>

            <ng-container *ngIf="!enviado">
                <div class="form-header">
                    <h2>¿Olvidaste tu contraseña?</h2>
                    <p>Ingresa tu correo y te enviaremos un enlace para restablecerla.</p>
                </div>

                <div *ngIf="errorMessage" class="alert alert-error" (click)="errorMessage = ''" style="cursor: pointer;">
                    <i class="bi bi-exclamation-circle"></i>
                    <span>{{ errorMessage }}</span>
                </div>

                <form (ngSubmit)="solicitar()">
                    <div class="input-group">
                        <label>Email</label>
                        <div class="input-wrapper">
                            <i class="bi bi-envelope"></i>
                            <input type="email" class="input-field"
                                   placeholder="tu@correo.com"
                                   [(ngModel)]="email"
                                   name="email"
                                   required>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary" [disabled]="isLoading">
                        <span *ngIf="!isLoading">Enviar enlace de recuperación</span>
                        <span *ngIf="isLoading">
                            <i class="bi bi-hourglass-split"></i> Enviando...
                        </span>
                    </button>
                </form>
            </ng-container>

            <ng-container *ngIf="enviado">
                <div class="form-header">
                    <div class="success-icon-wrapper">
                        <i class="bi bi-envelope-check"></i>
                    </div>
                    <h2>Revisa tu correo</h2>
                    <p>Si el correo está registrado, recibirás un enlace para restablecer tu contraseña en los próximos minutos.</p>
                </div>
                
                <div class="alert alert-success">
                    <i class="bi bi-check-circle"></i>
                    <span>El enlace expira en <b>30 minutos</b>.</span>
                </div>
            </ng-container>

            <div class="back-to-login-container">
                <a routerLink="/login" class="forgot-link">
                    <i class="bi bi-arrow-left"></i> Volver al inicio de sesión
                </a>
            </div>

        </div>
    </div>

</div>
