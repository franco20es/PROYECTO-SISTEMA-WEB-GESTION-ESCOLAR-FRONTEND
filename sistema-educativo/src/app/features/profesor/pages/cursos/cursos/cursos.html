<script>
const CURSOS=[
  {id:1,name:'Matemáticas',color:'#2A63E6',secs:['3ro A','3ro B'],alum:62,mats:15,evals:8,hor:'Lun/Mié/Vie',prog:72},
  {id:2,name:'Física',color:'#FF5B1F',secs:['4to A','4to B'],alum:59,mats:12,evals:6,hor:'Mar/Jue',prog:65},
  {id:3,name:'Tutoría',color:'#F5A623',secs:['3ro A','3ro B'],alum:62,mats:4,evals:0,hor:'Mar/Vie',prog:80}
];
 
const svgBook='<path d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>';
 
function renderGrid(){
  document.getElementById('grid').innerHTML=CURSOS.map(c=>`
  <div class="cc" data-id="${c.id}" onclick="openCurso(${c.id})">
    <div class="cc-bar" style="background:${c.color}"></div>
    <div class="cc-body">
      <div class="cc-row">
        <div class="cc-ico" style="background:${c.color}12"><svg viewBox="0 0 24 24" style="fill:${c.color}">${svgBook}</svg></div>
        <div class="cc-secs">${c.secs.map(s=>`<span>${s}</span>`).join('')}</div>
      </div>
      <div class="cc-name">${c.name}</div>
      <div class="cc-meta"><div class="cc-mi"><svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2z"/></svg>${c.hor}</div><div class="cc-mi"><svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5z"/></svg>${c.alum} alumnos</div></div>
      <div class="cc-stats">
        <div class="cc-st"><strong>${c.mats}</strong><span>Materiales</span></div>
        <div class="cc-st"><strong>${c.evals}</strong><span>Evaluaciones</span></div>
        <div class="cc-st"><strong>${c.prog}%</strong><span>Avance</span></div>
      </div>
    </div>

  </div>`).join('');
}
renderGrid();
 
let activeCurso=null;
function openCurso(id){
  document.querySelectorAll('.cc').forEach(c=>c.classList.remove('on'));
  document.querySelector(`[data-id="${id}"]`).classList.add('on');
  activeCurso=CURSOS.find(c=>c.id===id);
  renderDetail();
  setTimeout(()=>document.getElementById('detail').scrollIntoView({behavior:'smooth',block:'start'}),80);
}
function closeDetail(){document.getElementById('detail').classList.remove('show');document.querySelectorAll('.cc').forEach(c=>c.classList.remove('on'));activeCurso=null}
 
function renderDetail(){
  const c=activeCurso;
  const d=document.getElementById('detail');d.classList.add('show');
  d.innerHTML=`
  <div class="dh"><div class="dh-bar" style="background:${c.color}"></div><div class="dh-inner"><div class="dh-bg">${c.name.toUpperCase()}</div><button class="dh-close" onclick="closeDetail()"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button>
    <div class="dh-cnt"><div class="dh-left"><div class="dh-tag">${c.secs.join(' · ')} · Bimestre II</div><div class="dh-title">${c.name}</div><div class="dh-meta"><div class="dh-mi"><svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2z"/></svg>${c.hor}</div><div class="dh-mi"><svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5z"/></svg>${c.alum} alumnos</div><div class="dh-mi"><svg viewBox="0 0 24 24">${svgBook}</svg>${c.mats} materiales</div></div></div></div>
  </div></div>
  <div class="dtabs">
    <div class="dt on" onclick="swDt(this,0)"><svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6z"/></svg><span>Contenido</span></div>
    <div class="dt" onclick="swDt(this,1)"><svg viewBox="0 0 24 24"><path d="M2 12.5C2 9.46 4.46 7 7.5 7H18l-4-4 1.41-1.41L21.83 8l-6.42 6.41L14 13l4-4H7.5C5.57 9 4 10.57 4 12.5S5.57 16 7.5 16H11v2H7.5C4.46 18 2 15.54 2 12.5z"/></svg><span>Materiales</span><div class="dt-c">${c.mats}</div></div>
    <div class="dt" onclick="swDt(this,2)"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg><span>Anuncios</span><div class="dt-c">3</div></div>
    <div class="dt" onclick="swDt(this,3)"><svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.1 0-2 .9-2 2v14a2 2 0 002 2h14a2 2 0 002-2V6c0-1.1-.9-2-2-2z"/></svg><span>Calendario</span></div>
    <div class="dt" onclick="swDt(this,4)"><svg viewBox="0 0 24 24"><path d="M19 19H5V5h7V3H5a2 2 0 00-2 2v14a2 2 0 002 2h14c1.1 0 2-.9 2-2v-7h-2v7z"/></svg><span>Accesos rápidos</span></div>
  </div>
  <div class="dp on" id="dt0">${tabContenido()}</div>
  <div class="dp" id="dt1">${tabMateriales()}</div>
  <div class="dp" id="dt2">${tabAnuncios()}</div>
  <div class="dp" id="dt3">${tabCalendario()}</div>
  <div class="dp" id="dt4">${tabAccesos()}</div>`;
}
 
function swDt(el,i){el.closest('.detail').querySelectorAll('.dt').forEach(t=>t.classList.remove('on'));el.classList.add('on');for(let j=0;j<5;j++)document.getElementById('dt'+j).classList.toggle('on',j===i)}
 
/* ═══ TAB: CONTENIDO ═══ */

      {t:'Introducción a ecuaciones',d:'3 Mar',s:'done'},{t:'Resolución paso a paso',d:'5 Mar',s:'done'},{t:'Problemas de aplicación',d:'10 Mar',s:'done'},{t:'Evaluación unidad 1',d:'12 Mar',s:'done'}]},
    {n:2,nm:'Sistemas de ecuaciones',sub:'5 temas · 10 sesiones · Completada',st:'done',topics:[

      {t:'Concepto de función',d:'7 Abr',s:'done'},{t:'Función lineal',d:'9 Abr',s:'done'},{t:'Función cuadrática — Gráfica y vértice',d:'12 May',s:'cur'},{t:'Evaluación unidad 3',d:'21 May',s:'lock'}]},
    {n:4,nm:'Estadística y probabilidad',sub:'3 temas · 6 sesiones · Bloqueada',st:'lock',topics:[
      {t:'Medidas de tendencia central',d:'—',s:'lock'},{t:'Distribución de frecuencias',d:'—',s:'lock'},{t:'Introducción a probabilidad',d:'—',s:'lock'}]}
  ];
  return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px"><div class="stitle" style="margin-bottom:0">Unidades del curso</div><button class="btn btn-gh btn-sm" onclick="showToast('Función próximamente','info')"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>Agregar unidad</button></div>
  ${units.map(u=>`<div class="unit ${u.st==='cur'?'open':''}" onclick="this.classList.toggle('open')"><div class="unit-h"><div class="unit-num">${u.n}</div><div class="unit-info"><div class="unit-nm">${u.nm}</div><div class="unit-sub">${u.sub}</div></div><span class="unit-badge ${u.st==='done'?'ub-done':u.st==='cur'?'ub-cur':'ub-lock'}">${u.st==='done'?'Completada':u.st==='cur'?'En curso':'Bloqueada'}</span><div class="unit-actions"><button class="ua" title="Editar" onclick="event.stopPropagation()"><svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25z"/></svg></button><button class="ua" title="Agregar tema" onclick="event.stopPropagation();showToast('Tema agregado','info')"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></button></div></div>

  <div class="recent"><div class="stitle">Subido recientemente</div>
    <div class="rc-item"><div class="rc-ico mi-pdf"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/></svg></div><div class="rc-info"><div class="rc-nm">Guía — Función cuadrática</div><div class="rc-date">Hoy 10:30 am</div></div></div>

    <div class="rc-item"><div class="rc-ico mi-doc"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/></svg></div><div class="rc-info"><div class="rc-nm">Ejercicios — Sistemas 2x2</div><div class="rc-date">10 May</div></div></div>
  </div>`;
}
 
/* ═══ TAB: MATERIALES ═══ */
function tabMateriales(){

    {nm:'Guía — Función cuadrática',tipo:'pdf',unidad:'Unidad 3',date:'12 May 2025',upd:'Hoy',sz:'2.4 MB'},

  const icoPath='<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>';
  return `<div class="mat-toolbar"><div class="srch"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5z"/></svg><input placeholder="Buscar material..."></div>
  <div style="display:flex;gap:2px"><span class="chip on" onclick="fChip(this)">Todos</span><span class="chip" onclick="fChip(this)">PDF</span><span class="chip" onclick="fChip(this)">Video</span><span class="chip" onclick="fChip(this)">Doc</span><span class="chip" onclick="fChip(this)">Enlace</span></div>
  <button class="btn btn-or" onclick="openMo('moUpload')"><svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z"/></svg>Subir material</button></div>

  const days=['LUN','MAR','MIÉ','JUE','VIE','SÁB','DOM'];
  const events={5:'<span class="cal-ev ce-tarea">Tarea #5</span>',8:'<span class="cal-ev ce-mat">Guía subida</span>',9:'<span class="cal-ev ce-exam">Exam. Fís.</span>',12:'<span class="cal-ev ce-mat">Video subido</span><span class="cal-ev ce-anun">Anuncio</span>',15:'<span class="cal-ev ce-tarea">Tarea #6</span>',19:'<span class="cal-ev ce-exam">Lab. Ondas</span>',21:'<span class="cal-ev ce-exam">Exam. Parcial</span>',28:'<span class="cal-ev ce-exam">Exam. Final</span>'};
  let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div class="stitle" style="margin-bottom:0">Mayo 2025</div><div style="display:flex;gap:4px"><span style="display:flex;align-items:center;gap:3px;font-size:9.5px;color:var(--g6)"><span class="cal-ev ce-exam" style="display:inline;padding:1px 4px">Eval</span></span><span style="display:flex;align-items:center;gap:3px;font-size:9.5px;color:var(--g6)"><span class="cal-ev ce-tarea" style="display:inline;padding:1px 4px">Tarea</span></span><span style="display:flex;align-items:center;gap:3px;font-size:9.5px;color:var(--g6)"><span class="cal-ev ce-mat" style="display:inline;padding:1px 4px">Material</span></span><span style="display:flex;align-items:center;gap:3px;font-size:9.5px;color:var(--g6)"><span class="cal-ev ce-anun" style="display:inline;padding:1px 4px">Anuncio</span></span></div></div>`;
  html+='<div class="cal-month">';
  days.forEach(d=>html+=`<div class="cal-dh">${d}</div>`);
  // April fill (30 starts Thu)
  for(let i=0;i<3;i++) html+=`<div class="cal-d other"><div class="cal-dn">${28+i}</div></div>`;
  for(let d=1;d<=31;d++){
    const isToday=d===12;
    html+=`<div class="cal-d ${isToday?'today':''}"><div class="cal-dn">${d}</div>${events[d]||''}</div>`;
  }
  // June fill
  html+=`<div class="cal-d other"><div class="cal-dn">1</div></div>`;
  html+='</div>';
  return html;
}
