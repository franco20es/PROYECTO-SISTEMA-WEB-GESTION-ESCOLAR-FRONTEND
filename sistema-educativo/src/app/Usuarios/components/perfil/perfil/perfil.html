

<!-- ════════════════════════════════════════
     VIEW: PERFIL
════════════════════════════════════════ -->
<div class="view" id="view-perfil">
  <div class="section-tag">Información personal</div>
  <h1 class="page-title">Mi <em>Perfil</em></h1>
  <p class="page-subtitle">Actualiza tu información y preferencias de cuenta.</p>

  <div class="panel">
    <div class="panel-hdr"><div class="panel-title">Datos <em>Personales</em></div><button class="btn btn-gold btn-sm" onclick="toast('Perfil guardado','success')"><i class="bi bi-check-lg"></i>Guardar</button></div>
    <div class="panel-body">
      <!-- Avatar -->
      <div style="display:flex;align-items:center;gap:20px;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border-soft);flex-wrap:wrap">
        <div style="width:72px;height:72px;background:linear-gradient(135deg,var(--gold),#a010a8);display:flex;align-items:center;justify-content:center;font-family:var(--f-display);font-size:2rem;color:#fff;flex-shrink:0;cursor:pointer;position:relative" onclick="toast('Subida de foto próximamente','warn')">
          AC
          <div style="position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:.3s" onmouseenter="this.style.opacity=1" onmouseleave="this.style.opacity=0"><i class="bi bi-camera-fill" style="font-size:1.2rem;color:#fff"></i></div>
        </div>
        <div>
          <div style="font-size:.88rem;font-weight:600;margin-bottom:4px">Foto de Perfil</div>
          <div style="font-size:.74rem;color:var(--text-secondary);margin-bottom:10px">JPG o PNG · Máx. 5MB · 400×400px</div>
          <button class="btn btn-dark btn-sm" onclick="toast('Función próximamente','warn')"><i class="bi bi-upload"></i>Subir</button>
        </div>
      </div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Nombre</label><input type="text" class="form-input" value="Andrea"></div>
        <div class="form-group"><label class="form-label">Apellido</label><input type="text" class="form-input" value="Castro Ríos"></div>
      </div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" value="andrea.castro@gmail.com"></div>
        <div class="form-group"><label class="form-label">Teléfono</label><input type="tel" class="form-input" value="+51 987 654 321"></div>
      </div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">DNI</label><input type="text" class="form-input" value="72345678"></div>
        <div class="form-group"><label class="form-label">Ciudad</label><input type="text" class="form-input" value="Lima, Perú"></div>
      </div>
    </div>
  </div>
</div>
