

<!-- ════════════════════════════════════════
     VIEW: TICKETS
════════════════════════════════════════ -->
<div class="view" id="view-tickets">
  <div class="section-tag">Entradas Digitales</div>
  <h1 class="page-title">Mis <em>Tickets</em></h1>
  <p class="page-subtitle">Todas tus entradas en un solo lugar. Muestra el QR al ingresar.</p>

  <div class="tickets-toolbar">
    <button class="btn btn-gold btn-sm" id="tf-all" onclick="setTicketFilter('all',this)"><i class="bi bi-grid"></i>Todos</button>
    <button class="btn btn-dark btn-sm" id="tf-active" onclick="setTicketFilter('active',this)"><i class="bi bi-calendar-check"></i>Próximos</button>
    <button class="btn btn-dark btn-sm" id="tf-past" onclick="setTicketFilter('past',this)"><i class="bi bi-calendar-x"></i>Pasados</button>
    <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
      <div style="display:flex;align-items:center;gap:8px;background:var(--dark-3);border:1px solid var(--border);padding:8px 13px">
        <i class="bi bi-search" style="color:var(--text-muted);font-size:.85rem"></i>
        <input type="text" placeholder="Buscar evento..." style="background:transparent;border:none;outline:none;font-family:var(--f-body);font-size:.82rem;color:#fff;width:160px" oninput="filterTickets(this.value)">
      </div>
      <span id="ticketCnt" style="font-size:.68rem;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);white-space:nowrap">8 tickets</span>
    </div>
  </div>

  <div class="tickets-grid" id="ticketsGrid"></div>
</div>
